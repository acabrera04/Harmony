name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmony-backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: harmony
          POSTGRES_PASSWORD: harmony
          POSTGRES_DB: harmony_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://harmony:harmony@localhost:5432/harmony_dev
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Detect relevant code/test changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'harmony-frontend/**'
              - 'harmony-backend/**'
              - 'tests/**'

      - name: Skip backend tests for non-code changes
        if: steps.changes.outputs.relevant != 'true'
        run: echo "No changes under harmony-frontend/, harmony-backend/, or tests/; skipping backend tests."

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.relevant == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: harmony-backend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: npm ci

      - name: Generate Prisma client
        if: steps.changes.outputs.relevant == 'true'
        run: npx prisma generate

      - name: Run migrations
        if: steps.changes.outputs.relevant == 'true'
        run: npx prisma migrate deploy

      - name: Run backend tests
        if: steps.changes.outputs.relevant == 'true'
        run: npm test
