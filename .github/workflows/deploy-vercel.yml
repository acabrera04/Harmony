name: Deploy Frontend to Vercel

# GitHub Actions is the sole production deploy authority for the frontend.
# Vercel's built-in git integration must be disabled (Settings → Git → disconnect)
# after this workflow is active to prevent double-deploys.
#
# Required repository secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN       - Vercel personal access token
#   VERCEL_ORG_ID      - Vercel team/org ID (from .vercel/project.json or dashboard)
#   VERCEL_PROJECT_ID  - Vercel project ID (from .vercel/project.json or dashboard)
#
# Vercel CLI commands (pull/build/deploy) run from the repo root so the CLI
# can resolve the "Root Directory: harmony-frontend" setting from the project
# config. npm steps run from harmony-frontend/ via explicit working-directory.

on:
  push:
    branches: [main]
    paths:
      - "harmony-frontend/**"
      - ".github/workflows/deploy-vercel.yml"
  pull_request:
    branches: [main]
    paths:
      - "harmony-frontend/**"
  workflow_dispatch:

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: preview
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: harmony-frontend/package-lock.json

      - name: Install dependencies
        working-directory: harmony-frontend
        run: npm ci

      - name: Lint
        working-directory: harmony-frontend
        run: npm run lint

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Vercel preview deployed:** ${{ steps.deploy.outputs.preview_url }}`
            })

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: harmony-frontend/package-lock.json

      - name: Install dependencies
        working-directory: harmony-frontend
        run: npm ci

      - name: Lint
        working-directory: harmony-frontend
        run: npm run lint

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
